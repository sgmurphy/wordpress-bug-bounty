name: Mirror WordPress Plugins & Themes

on:
  workflow_dispatch:
    inputs:
      update_workflows:
        description: 'Force-install the latest semgrep.yml in all tracked repos'
        type: boolean
        default: false
      reconcile:
        description: 'Check all targets for version drift and re-mirror stale repos'
        type: boolean
        default: false
  schedule:
  - cron: '11 * * * *'

concurrency:
  group: mirror-targets
  cancel-in-progress: false

jobs:
  download:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: python mirror-targets.py ${{ inputs.update_workflows == true && '--update-workflows' || '' }} ${{ inputs.reconcile == true && '--reconcile' || '' }}
      env:
        GH_TOKEN: ${{ secrets.WORDPRESS_BUG_BOUNTY_GITHUB_TOKEN }}
