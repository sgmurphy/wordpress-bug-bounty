name: Archive Stale Repos

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 3am UTC
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python archive-stale-repos.py
        env:
          GH_TOKEN: ${{ secrets.WORDPRESS_BUG_BOUNTY_GITHUB_TOKEN }}
